<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/src/styles/global.css">
    <link rel="stylesheet" href="/src/styles/catalog.css">
    <link rel="stylesheet" href="/src/styles/car-list.css">
    <title>Rental-Car</title>
    <script type="module" src="/src/components/main.js" defer></script>
    <script type="module" src="/src/components/select-builder.js" defer></script>
    <script type="module" src="/src/form/filter-form.js" defer></script>
    <script type="module" src="/src/components/build-car-cards.js" defer></script>
    <script type="module" src="/src/components/api/fetch-api-cars.js" defer></script>
    <script type="module" src="/src/components/render-catalog.js" defer></script>
    <script type="module" src="/src/components/load-more.js" defer></script>
</head>
<body>
<div id="wrapper">
    <main class="container_catalog">
        <!--Filter form-->
        <form class="filter_form">

            <div class="custom_select">

                <span class="select_label">Car brand</span>

                <div class="select_header">
                    <span class="selected_value">Choose a brand</span>

                    <svg
                            class="arrow"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                    >
                        <path
                                d="M6 9L12 15L18 9"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                        />
                    </svg>
                </div>

                <div class="select_dropdown"></div>

                <input
                        type="hidden"
                        name="carBrand"
                        class="hidden_input"
                />

            </div>

            <div class="custom_select">

                <span class="select_label">Price/ 1 hour</span>

                <div class="select_header">
                    <span class="selected_value">Choose a price</span>

                    <svg
                            class="arrow"
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                    >
                        <path
                                d="M6 9L12 15L18 9"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                        />
                    </svg>
                </div>

                <div class="select_dropdown"></div>

                <input
                        type="hidden"
                        name="carPrice"
                        class="hidden_input"
                />
            </div>

            <div class="car_mileage">
                <span class="select_label">Сar mileage / km</span>
                <div class="mileage_container">
                    <input
                            type="number"
                            name="mileageFrom"
                            id="mileage_from"
                            placeholder="From"
                            min="1"
                    />
                    <input
                            type="number"
                            name="mileageTo"
                            id="mileage_to"
                            placeholder="To"
                            min="1"
                    />
                </div>
            </div>

            <button type="submit" id="search_btn">Search</button>
        </form>
        <div class="container_catalog_cars">
        </div>
        <button type="submit" class="btn_load_more" id="btn_load_more">Load more</button>
    </main>
</div>
</body>
</html>
